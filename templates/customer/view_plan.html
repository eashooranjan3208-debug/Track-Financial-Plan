{% extends "base.html" %}
{% block title %}Plan Report — Track & Act{% endblock %}

{% block content %}
<div class="vp-page-header">
  <div>
    <h2>Financial Plan Report</h2>
    <p>Plan year {{ plan.plan_year }}</p>
  </div>
  <a href="{{ url_for('customer.dashboard') }}" class="btn-vp-ghost">
    <i class="bi bi-arrow-left"></i> Back to Dashboard
  </a>
</div>

<div class="vp-card">
  <div class="vp-card-body" style="padding:0;">
    <iframe src="{{ url_for('customer.serve_plan_content', plan_id=plan.id) }}"
            style="width:100%; height:80vh; border:none; border-radius:var(--radius);"
            title="Financial Plan Report Document">
    </iframe>
  </div>
</div>
{% endblock %}
